<svg width="460" height="340" viewBox="0 0 460 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="460" height="340" fill="#ffffff"/>
  <rect x="12" y="12" width="436" height="316" rx="12" fill="#ffffff" stroke="#A8A8B8" stroke-width="2"/>

  <text x="28" y="40" font-family="Arial, sans-serif" font-size="14" fill="#1B1B1B">Sensor Hub Circuit Diagram</text>

  <!-- ESP32-C6 (center) -->
  <rect x="30" y="80" width="130" height="80" rx="6" fill="#FDF8E7" stroke="#444" stroke-width="1.5"/>
  <text x="95" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">ESP32-C6</text>
  <text x="95" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">(MCU + WiFi/BLE)</text>

  <!-- OLED -->
  <rect x="30" y="190" width="100" height="48" rx="6" fill="#F2F2FA" stroke="#888" stroke-width="1"/>
  <text x="80" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">OLED Display</text>

  <!-- Board-to-Board Header -->
  <rect x="200" y="80" width="100" height="56" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="250" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#222">Board-to-Board</text>
  <text x="250" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#222">Header</text>

  <!-- Separator line for Upper PCB -->
  <line x1="215" y1="152" x2="440" y2="152" stroke="#A8A8B8" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="330" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">Upper PCB (Sensor Board)</text>

  <!-- SHT40 -->
  <rect x="200" y="178" width="90" height="40" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="245" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#222">SHT40</text>

  <!-- SGP41 -->
  <rect x="310" y="178" width="90" height="40" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="355" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#222">SGP41</text>

  <!-- VEML7700 -->
  <rect x="200" y="232" width="90" height="40" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="245" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#222">VEML7700</text>

  <!-- MEMS Mic -->
  <rect x="310" y="232" width="90" height="40" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="355" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#222">MEMS Mic</text>

  <!-- USB-C -->
  <rect x="30" y="280" width="80" height="40" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="70" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#222">USB-C</text>

  <!-- PMIC -->
  <rect x="140" y="280" width="80" height="40" rx="6" fill="#FDF8E7" stroke="#444" stroke-width="1.5"/>
  <text x="180" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#222">PMIC</text>

  <!-- 2x 18650 Battery -->
  <rect x="250" y="280" width="100" height="40" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="300" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#222">2x 18650</text>

  <!-- ESP32-C6 to OLED (I2C) -->
  <line x1="80" y1="160" x2="80" y2="190" stroke="#444" stroke-width="2"/>
  <circle cx="80" r="3" cy="160" fill="#444"/>
  <text x="90" y="178" font-family="Arial, sans-serif" font-size="10" fill="#666">I2C</text>

  <!-- ESP32-C6 to B2B Header -->
  <line x1="160" y1="110" x2="200" y2="108" stroke="#444" stroke-width="2"/>
  <circle cx="160" r="3" cy="110" fill="#444"/>

  <!-- B2B Header down to sensors -->
  <line x1="250" y1="136" x2="250" y2="178" stroke="#444" stroke-width="2"/>
  <circle cx="250" r="3" cy="136" fill="#444"/>
  <line x1="250" y1="152" x2="355" y2="178" stroke="#444" stroke-width="2"/>
  <line x1="250" y1="218" x2="250" y2="232" stroke="#444" stroke-width="2"/>
  <line x1="250" y1="218" x2="355" y2="232" stroke="#444" stroke-width="2"/>

  <!-- Labels for sensor buses -->
  <text x="262" y="168" font-family="Arial, sans-serif" font-size="9" fill="#666">I2C</text>
  <text x="310" y="170" font-family="Arial, sans-serif" font-size="9" fill="#666">I2C</text>
  <text x="262" y="228" font-family="Arial, sans-serif" font-size="9" fill="#666">I2C</text>
  <text x="310" y="230" font-family="Arial, sans-serif" font-size="9" fill="#666">I2S</text>

  <!-- USB-C to PMIC -->
  <line x1="110" y1="300" x2="140" y2="300" stroke="#444" stroke-width="2"/>
  <circle cx="110" r="3" cy="300" fill="#444"/>
  <text x="125" y="294" font-family="Arial, sans-serif" font-size="10" fill="#666">VBUS</text>

  <!-- PMIC to Battery -->
  <line x1="220" y1="300" x2="250" y2="300" stroke="#444" stroke-width="2"/>
  <circle cx="220" r="3" cy="300" fill="#444"/>
  <text x="235" y="294" font-family="Arial, sans-serif" font-size="10" fill="#666">VBAT</text>

  <!-- PMIC to ESP32-C6 -->
  <line x1="180" y1="280" x2="120" y2="160" stroke="#444" stroke-width="2"/>
  <circle cx="180" r="3" cy="280" fill="#444"/>
  <text x="156" y="228" font-family="Arial, sans-serif" font-size="10" fill="#666">PWR</text>
</svg>
