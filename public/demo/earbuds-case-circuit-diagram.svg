<svg width="460" height="320" viewBox="0 0 460 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="460" height="320" fill="#ffffff"/>
  <rect x="12" y="12" width="436" height="296" rx="12" fill="#ffffff" stroke="#A8A8B8" stroke-width="2"/>

  <text x="28" y="40" font-family="Arial, sans-serif" font-size="14" fill="#1B1B1B">Earbuds Case Circuit Diagram</text>

  <!-- USB-C -->
  <rect x="30" y="80" width="100" height="60" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="80" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">USB-C</text>

  <!-- BQ25895 PMIC -->
  <rect x="170" y="70" width="130" height="80" rx="6" fill="#FDF8E7" stroke="#444" stroke-width="1.5"/>
  <text x="235" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">BQ25895</text>
  <text x="235" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">(PMIC)</text>

  <!-- LiPo Battery -->
  <rect x="170" y="190" width="130" height="60" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="235" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">LiPo Battery</text>

  <!-- Qi Coil -->
  <rect x="30" y="190" width="100" height="60" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="80" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">Qi Coil</text>

  <!-- 4x Pogo Pins -->
  <rect x="340" y="70" width="100" height="60" rx="6" fill="#F7F4EE" stroke="#444" stroke-width="1.5"/>
  <text x="390" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">4x Pogo</text>
  <text x="390" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#222">Pins</text>

  <!-- LED -->
  <rect x="340" y="160" width="100" height="50" rx="6" fill="#F2F2FA" stroke="#888" stroke-width="1"/>
  <text x="390" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">LED</text>

  <!-- USB-C to BQ25895 -->
  <line x1="130" y1="110" x2="170" y2="110" stroke="#444" stroke-width="2"/>
  <circle cx="130" r="3" cy="110" fill="#444"/>
  <text x="148" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">VBUS</text>

  <!-- BQ25895 to Pogo Pins -->
  <line x1="300" y1="100" x2="340" y2="100" stroke="#444" stroke-width="2"/>
  <circle cx="300" r="3" cy="100" fill="#444"/>

  <!-- BQ25895 to Battery -->
  <line x1="235" y1="150" x2="235" y2="190" stroke="#444" stroke-width="2"/>
  <circle cx="235" r="3" cy="150" fill="#444"/>
  <text x="248" y="175" font-family="Arial, sans-serif" font-size="10" fill="#666">VBAT</text>

  <!-- Qi Coil to BQ25895 -->
  <line x1="80" y1="190" x2="80" y2="160" stroke="#444" stroke-width="2"/>
  <line x1="80" y1="160" x2="170" y2="120" stroke="#444" stroke-width="2"/>
  <circle cx="80" r="3" cy="190" fill="#444"/>

  <!-- BQ25895 to LED -->
  <line x1="300" y1="130" x2="340" y2="185" stroke="#444" stroke-width="2"/>
  <circle cx="300" r="3" cy="130" fill="#444"/>
  <text x="330" y="150" font-family="Arial, sans-serif" font-size="10" fill="#666">CHG</text>

  <!-- Labels on connections -->
  <text x="316" y="92" font-family="Arial, sans-serif" font-size="10" fill="#666">PWR</text>
</svg>
